<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="d20Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="50%" stop-color="#d4a418"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <filter id="d20Shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- D20 shape (icosahedron face) -->
  <g filter="url(#d20Shadow)">
    <polygon 
      points="24,4 44,16 44,32 24,44 4,32 4,16" 
      fill="url(#d20Grad)" 
      stroke="#92400e" 
      stroke-width="1.5"
    />
    <!-- Inner triangular facets -->
    <polygon points="24,4 24,24 4,16" fill="none" stroke="#78350f" stroke-width="0.5" opacity="0.5"/>
    <polygon points="24,4 24,24 44,16" fill="none" stroke="#78350f" stroke-width="0.5" opacity="0.5"/>
    <polygon points="24,44 24,24 4,32" fill="none" stroke="#78350f" stroke-width="0.5" opacity="0.5"/>
    <polygon points="24,44 24,24 44,32" fill="none" stroke="#78350f" stroke-width="0.5" opacity="0.5"/>
    <polygon points="4,16 24,24 4,32" fill="none" stroke="#78350f" stroke-width="0.5" opacity="0.5"/>
    <polygon points="44,16 24,24 44,32" fill="none" stroke="#78350f" stroke-width="0.5" opacity="0.5"/>
  </g>
  <!-- Number 20 -->
  <text 
    x="24" 
    y="28" 
    text-anchor="middle" 
    font-family="Cinzel, serif" 
    font-size="12" 
    font-weight="bold"
    fill="#451a03"
  >20</text>
</svg>
